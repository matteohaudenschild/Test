name: Exchange Mail Bridge Aufschaltung

on:
  workflow_dispatch:
    inputs:
      lookback_minutes:
        description: "How many minutes back to scan"
        required: false
        default: "60"
      mail_top:
        description: "Maximum messages to import"
        required: false
        default: "30"
      include_attachments:
        description: "Download image attachments into Google Drive"
        required: false
        default: "true"
      max_attachment_bytes:
        description: "Maximum bytes per downloaded attachment"
        required: false
        default: "2500000"
      include_body_html:
        description: "Save full HTML mail bodies into Google Drive"
        required: false
        default: "true"
      max_body_html_chars:
        description: "Maximum HTML body characters to save per message"
        required: false
        default: "200000"
      dry_run_summary:
        description: "Only verify Exchange access and print a safe summary; do not post to Apps Script"
        required: false
        default: "false"
  schedule:
    - cron: "*/10 * * * *"

jobs:
  sync-aufschaltung-mail:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      EWS_URL: ${{ secrets.AUFSCHALTUNG_EWS_URL }}
      EWS_EMAIL: ${{ secrets.AUFSCHALTUNG_EWS_EMAIL }}
      EWS_USERNAME: ${{ secrets.AUFSCHALTUNG_EWS_USERNAME }}
      EWS_PASSWORD: ${{ secrets.AUFSCHALTUNG_EWS_PASSWORD }}
      EWS_AUTH_TYPE: ${{ secrets.AUFSCHALTUNG_EWS_AUTH_TYPE }}
      EWS_VERIFY_TLS: ${{ secrets.AUFSCHALTUNG_EWS_VERIFY_TLS }}
      APPS_SCRIPT_WEBAPP_URL: ${{ secrets.AUFSCHALTUNG_APPS_SCRIPT_WEBAPP_URL }}
      BRIDGE_TOKEN: ${{ secrets.AUFSCHALTUNG_BRIDGE_TOKEN }}
      MAIL_LOOKBACK_MINUTES: ${{ github.event_name == 'workflow_dispatch' && inputs.lookback_minutes || '360' }}
      MAIL_TOP: ${{ github.event_name == 'workflow_dispatch' && inputs.mail_top || '50' }}
      INCLUDE_ATTACHMENTS: ${{ github.event_name == 'workflow_dispatch' && inputs.include_attachments || 'true' }}
      MAX_ATTACHMENT_BYTES: ${{ github.event_name == 'workflow_dispatch' && inputs.max_attachment_bytes || '2500000' }}
      INCLUDE_BODY_HTML: ${{ github.event_name == 'workflow_dispatch' && inputs.include_body_html || 'true' }}
      MAX_BODY_HTML_CHARS: ${{ github.event_name == 'workflow_dispatch' && inputs.max_body_html_chars || '200000' }}
      DRY_RUN_SUMMARY: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run_summary || 'false' }}

    steps:
      - name: Check required Aufschaltung secrets
        id: config
        shell: bash
        run: |
          missing=0
          for name in EWS_URL EWS_EMAIL EWS_USERNAME EWS_PASSWORD EWS_AUTH_TYPE EWS_VERIFY_TLS APPS_SCRIPT_WEBAPP_URL BRIDGE_TOKEN; do
            if [ -z "${!name}" ]; then
              echo "Missing secret-backed env: $name"
              missing=1
            fi
          done

          if [ "$missing" -eq 0 ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Aufschaltung bridge is not configured yet. Skipping without failure."
          fi

      - name: Check out repository
        if: steps.config.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.config.outputs.configured == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.config.outputs.configured == 'true'
        run: python -m pip install -r exchange_mail_bridge/requirements.txt

      - name: Sync Aufschaltung Exchange inbox to Google Sheet
        if: steps.config.outputs.configured == 'true'
        run: |
          if [ "$DRY_RUN_SUMMARY" = "true" ]; then
            python exchange_mail_bridge/exchange_to_apps_script.py --dry-run-summary
          else
            python exchange_mail_bridge/exchange_to_apps_script.py
          fi
