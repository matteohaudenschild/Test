name: Exchange Mail Bridge Aufschaltung Login Check

on:
  workflow_dispatch:
    inputs:
      lookback_minutes:
        description: "How many minutes back to scan"
        required: false
        default: "60"
      mail_top:
        description: "Maximum messages to import"
        required: false
        default: "5"
      dry_run_summary:
        description: "Only verify Exchange access and print a safe summary; do not post to Apps Script"
        required: false
        default: "true"

jobs:
  sync-mail:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Exact Ausschreibung setup, except the login credentials below.
      EWS_URL: ${{ secrets.EWS_URL }}
      EWS_EMAIL: ${{ secrets.EWS_EMAIL }}
      EWS_USERNAME: ${{ secrets.AUFSCHALTUNG_EWS_USERNAME }}
      EWS_PASSWORD: ${{ secrets.AUFSCHALTUNG_EWS_PASSWORD }}
      EWS_AUTH_TYPE: ${{ secrets.EWS_AUTH_TYPE }}
      EWS_VERIFY_TLS: ${{ secrets.EWS_VERIFY_TLS }}
      APPS_SCRIPT_WEBAPP_URL: ${{ secrets.APPS_SCRIPT_WEBAPP_URL }}
      BRIDGE_TOKEN: ${{ secrets.BRIDGE_TOKEN }}
      MAIL_LOOKBACK_MINUTES: ${{ github.event_name == 'workflow_dispatch' && inputs.lookback_minutes || '60' }}
      MAIL_TOP: ${{ github.event_name == 'workflow_dispatch' && inputs.mail_top || '5' }}
      INCLUDE_ATTACHMENTS: "false"
      MAX_ATTACHMENT_BYTES: "2500000"
      INCLUDE_BODY_HTML: "false"
      MAX_BODY_HTML_CHARS: "200000"
      DRY_RUN_SUMMARY: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run_summary || 'true' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r exchange_mail_bridge/requirements.txt

      - name: Sync Exchange inbox to Google Sheet
        run: |
          if [ "$DRY_RUN_SUMMARY" = "true" ]; then
            python exchange_mail_bridge/exchange_to_apps_script.py --dry-run-summary
          else
            python exchange_mail_bridge/exchange_to_apps_script.py
          fi
