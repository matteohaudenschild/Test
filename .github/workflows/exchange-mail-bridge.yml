name: Exchange Mail Bridge

on:
  workflow_dispatch:
    inputs:
      lookback_minutes:
        description: "How many minutes back to scan"
        required: false
        default: "60"
      mail_top:
        description: "Maximum messages to import"
        required: false
        default: "30"
      include_attachments:
        description: "Download image attachments into Google Drive"
        required: false
        default: "true"
      max_attachment_bytes:
        description: "Maximum bytes per downloaded attachment"
        required: false
        default: "2500000"
      include_body_html:
        description: "Save full HTML mail bodies into Google Drive"
        required: false
        default: "true"
      max_body_html_chars:
        description: "Maximum HTML body characters to save per message"
        required: false
        default: "200000"
      dry_run_summary:
        description: "Only verify Exchange access and print a safe summary; do not post to Apps Script"
        required: false
        default: "false"
  schedule:
    - cron: "*/10 * * * *"

jobs:
  sync-mail:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      EWS_URL: ${{ secrets.EWS_URL }}
      EWS_EMAIL: ${{ secrets.EWS_EMAIL }}
      EWS_USERNAME: ${{ secrets.EWS_USERNAME }}
      EWS_PASSWORD: ${{ secrets.EWS_PASSWORD }}
      EWS_AUTH_TYPE: ${{ secrets.EWS_AUTH_TYPE }}
      EWS_VERIFY_TLS: ${{ secrets.EWS_VERIFY_TLS }}
      APPS_SCRIPT_WEBAPP_URL: ${{ secrets.APPS_SCRIPT_WEBAPP_URL }}
      BRIDGE_TOKEN: ${{ secrets.BRIDGE_TOKEN }}
      MAIL_LOOKBACK_MINUTES: ${{ github.event_name == 'workflow_dispatch' && inputs.lookback_minutes || '360' }}
      MAIL_TOP: ${{ github.event_name == 'workflow_dispatch' && inputs.mail_top || '50' }}
      INCLUDE_ATTACHMENTS: ${{ github.event_name == 'workflow_dispatch' && inputs.include_attachments || 'true' }}
      MAX_ATTACHMENT_BYTES: ${{ github.event_name == 'workflow_dispatch' && inputs.max_attachment_bytes || '2500000' }}
      INCLUDE_BODY_HTML: ${{ github.event_name == 'workflow_dispatch' && inputs.include_body_html || 'true' }}
      MAX_BODY_HTML_CHARS: ${{ github.event_name == 'workflow_dispatch' && inputs.max_body_html_chars || '200000' }}
      DRY_RUN_SUMMARY: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run_summary || 'false' }}
      EWS_FETCH_RETRIES: "4"
      EWS_FETCH_RETRY_DELAY_SECONDS: "20"
      EWS_TRANSIENT_FAILURE_EXIT_ZERO: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r exchange_mail_bridge/requirements.txt

      - name: Sync Exchange inbox to Google Sheet
        run: |
          if [ "$DRY_RUN_SUMMARY" = "true" ]; then
            python exchange_mail_bridge/exchange_to_apps_script.py --dry-run-summary
          else
            python exchange_mail_bridge/exchange_to_apps_script.py
          fi
